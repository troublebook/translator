name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libgstreamer1.0 gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good openjdk-17-jdk \
            autoconf automake libtool libltdl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython
          # Pin p4a to a stable release and patch hostpython3 to Python 3.12 (3.14 not supported yet)
          pip install "python-for-android==2024.1.21"
          # Patch both hostpython3 and python3 recipes to Python 3.12.8
          P4A_DIR=$(python -c "import pythonforandroid; import os; print(os.path.dirname(pythonforandroid.__file__))")
          python ${{ github.workspace }}/.github/patch_p4a.py "$P4A_DIR" "3.12.8"

      - name: Download and setup complete Android SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"
          cd "$SDK_DIR/cmdline-tools"
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-9123335_latest.zip -o ct.zip
          unzip -q ct.zip
          mv cmdline-tools latest
          rm ct.zip

          # Accept license and install everything in one call
          yes | "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --licenses --sdk_root="$SDK_DIR"
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_DIR" "platform-tools" "build-tools;33.0.3" "platforms;android-33"

          # Create legacy symlink for buildozer (it looks in tools/bin/)
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"

      - name: Download Android NDK
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform"
          curl -sL https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -o ndk.zip
          unzip -q ndk.zip -d "$NDK_DIR"
          rm ndk.zip

      - name: Build APK (debug)
        working-directory: ${{ github.workspace }}
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: translator-debug-apk
          path: ${{ github.workspace }}/bin/*.apk
          retention-days: 30

      - name: Debug APK location
        if: failure()
        run: |
          echo "Looking for APK files..."
          find ${{ github.workspace }} -name "*.apk" 2>/dev/null
          ls -la ${{ github.workspace }}/bin/ 2>/dev/null || echo "bin/ not found"
