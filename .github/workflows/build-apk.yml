name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libgstreamer1.0 gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good openjdk-17-jdk \
            autoconf automake libtool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Download Android SDK cmdline-tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"
          cd "$SDK_DIR/cmdline-tools"
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

      - name: Download Android SDK platform-tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "platform-tools" --sdk_root="$SDK_DIR" --licenses 2>&1 || true

      - name: Download Android SDK platform (API 33)
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "platforms;android-33" --sdk_root="$SDK_DIR" 2>&1 || true

      - name: Download Android SDK build-tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "build-tools;33.0.0" --sdk_root="$SDK_DIR" 2>&1 || true

      - name: Download Android NDK
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform"
          curl -sL https://dl.google.com/android/repository/android-ndk-r23b-linux.zip -o ndk.zip
          unzip -q ndk.zip -d "$NDK_DIR"
          rm ndk.zip

      - name: Build APK (debug)
        working-directory: ${{ github.workspace }}
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: translator-debug-apk
          path: ${{ github.workspace }}/bin/*.apk
          retention-days: 30

      - name: Debug APK location
        if: failure()
        run: |
          echo "Looking for APK files..."
          find ${{ github.workspace }} -name "*.apk" 2>/dev/null
          ls -la ${{ github.workspace }}/bin/ 2>/dev/null || echo "bin/ not found"
